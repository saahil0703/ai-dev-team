<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 MISSION CONTROL — Select Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--surface:rgba(15,20,40,0.8);--border:rgba(0,212,255,0.15);--cyan:#00D4FF;--green:#00FF88;--amber:#FFB800;--red:#FF3366;--text:#e0e6ed;--text-dim:rgba(224,230,237,0.5)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Grid background */
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:1}

/* Header */
.header{text-align:center;padding:60px 20px 40px;position:relative;z-index:2}
.header h1{font-family:'Orbitron',monospace;font-size:clamp(28px,5vw,48px);font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;animation:glow 3s ease-in-out infinite alternate}
.header .subtitle{color:var(--text-dim);font-size:14px;letter-spacing:6px;text-transform:uppercase;margin-top:8px}
@keyframes glow{from{filter:drop-shadow(0 0 8px rgba(0,212,255,0.3))}to{filter:drop-shadow(0 0 20px rgba(0,212,255,0.6))}}

/* Glitch */
.glitch{position:relative}
.glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;background:var(--bg)}
.glitch::before{-webkit-background-clip:text;-webkit-text-fill-color:transparent;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;left:2px;text-shadow:-2px 0 var(--red);clip:rect(44px,9999px,56px,0);animation:glitch-1 5s infinite linear alternate-reverse}
.glitch::after{-webkit-background-clip:text;-webkit-text-fill-color:transparent;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;left:-2px;text-shadow:2px 0 var(--cyan);clip:rect(44px,9999px,56px,0);animation:glitch-2 5s infinite linear alternate-reverse}
@keyframes glitch-1{0%{clip:rect(20px,9999px,36px,0)}20%{clip:rect(54px,9999px,70px,0)}40%{clip:rect(2px,9999px,18px,0)}60%{clip:rect(38px,9999px,52px,0)}80%{clip:rect(60px,9999px,80px,0)}100%{clip:rect(10px,9999px,30px,0)}}
@keyframes glitch-2{0%{clip:rect(65px,9999px,85px,0)}20%{clip:rect(10px,9999px,28px,0)}40%{clip:rect(45px,9999px,65px,0)}60%{clip:rect(5px,9999px,20px,0)}80%{clip:rect(30px,9999px,48px,0)}100%{clip:rect(55px,9999px,75px,0)}}

/* Projects grid */
.projects{max-width:1200px;margin:0 auto;padding:0 24px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px;position:relative;z-index:2}

.project-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;cursor:pointer;transition:all 0.3s ease;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.project-card:hover{border-color:var(--cyan);transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,212,255,0.15),inset 0 0 30px rgba(0,212,255,0.03)}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--green));opacity:0;transition:opacity 0.3s}
.project-card:hover::before{opacity:1}

.project-card .emoji{font-size:36px;margin-bottom:12px;display:block}
.project-card .name{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--cyan);margin-bottom:6px}
.project-card .desc{color:var(--text-dim);font-size:13px;line-height:1.5;margin-bottom:16px}

.project-card .stats{display:flex;gap:16px;flex-wrap:wrap}
.project-card .stat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
.project-card .stat .val{color:var(--green);font-family:'Orbitron',monospace;font-weight:600}

.project-card .phase-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.phase-badge.development{background:rgba(0,212,255,0.15);color:var(--cyan);border:1px solid rgba(0,212,255,0.3)}
.phase-badge.architecture{background:rgba(255,184,0,0.15);color:var(--amber);border:1px solid rgba(255,184,0,0.3)}
.phase-badge.planning{background:rgba(138,43,226,0.15);color:#b388ff;border:1px solid rgba(138,43,226,0.3)}

/* Progress bar in card */
.progress-wrap{margin-top:16px;background:rgba(255,255,255,0.05);border-radius:8px;height:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:8px;transition:width 0.5s ease}

/* Add project card */
.add-card{border:2px dashed rgba(0,212,255,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px;color:var(--text-dim)}
.add-card:hover{border-color:var(--cyan);color:var(--cyan)}
.add-card .plus{font-size:48px;font-weight:300;margin-bottom:8px;line-height:1}
.add-card .label{font-size:14px;letter-spacing:2px;text-transform:uppercase}

/* Clock */
.clock-bar{position:fixed;top:20px;right:24px;z-index:10;display:flex;align-items:center;gap:12px}
.clock{font-family:'Orbitron',monospace;font-size:13px;color:var(--text-dim)}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="scanlines"></div>

<div class="clock-bar">
  <span class="conn-dot"></span>
  <span class="clock" id="clock">--:--:--</span>
</div>

<div class="header">
  <h1 class="glitch" data-text="MISSION CONTROL">MISSION CONTROL</h1>
  <div class="subtitle">Universal AI Dev Team Dashboard</div>
</div>

<div class="projects" id="projects">
  <div class="project-card add-card" onclick="alert('Coming soon — tell P.R.I.N.T. to create a new project!')">
    <span class="plus">+</span>
    <span class="label">New Project</span>
  </div>
</div>

<script>
const WORKSPACE = '/api/projects';

function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US',{hour12:false});
}
setInterval(updateClock,1000);
updateClock();

async function loadProjects(){
  try{
    const res = await fetch('/api/projects');
    const data = await res.json();
    const container = document.getElementById('projects');
    
    // Clear existing project cards (keep add card)
    const addCard = container.querySelector('.add-card');
    container.innerHTML = '';
    
    data.projects.forEach(p => {
      const progress = p.tasks_total > 0 ? Math.round((p.tasks_done / p.tasks_total) * 100) : 0;
      const card = document.createElement('div');
      card.className = 'project-card';
      card.onclick = () => window.location.href = `/project/${p.slug}`;
      card.innerHTML = `
        <span class="emoji">${p.emoji || '📦'}</span>
        <div class="phase-badge ${(p.phase||'').toLowerCase()}">${p.phase || 'Unknown'}</div>
        <div class="name">${p.name}</div>
        <div class="desc">${p.description || ''}</div>
        <div class="stats">
          <div class="stat">📦 Tasks: <span class="val">${p.tasks_done}/${p.tasks_total}</span></div>
          <div class="stat">👥 Agents: <span class="val">${p.agents_active}</span></div>
          <div class="stat">🏃 Sprint: <span class="val">${p.sprint || '—'}</span></div>
        </div>
        <div class="progress-wrap"><div class="progress-fill" style="width:${progress}%"></div></div>
      `;
      container.appendChild(card);
    });
    
    container.appendChild(addCard);
  }catch(e){
    console.error('Failed to load projects:', e);
  }
}

loadProjects();
setInterval(loadProjects, 10000);
</script>
</body>
</html>
